name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 89.167.78.28
          username: dev
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /openclaw/openclaw
            git pull
            docker compose up -d --build
